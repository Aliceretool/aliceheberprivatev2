<div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; width: 100%; padding-bottom: 8px;">
  
  <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">

      <svg width="24" height="24" viewBox="0 0 24 24" fill="#4a90e2" xmlns="http://www.w3.org/2000/svg" style="display: block;">

      <span style="color: #1a1a2e; font-size: 20px; font-weight: 700; line-height: 1.1;">

    <a href="{{ table3.selectedRow.coach_world_url }}" target="_blank" style="color: #4a90e2; text-decoration: none; font-size: 14px; font-weight: 400; white-space: nowrap; margin-top: 2px;">

  <div style="color: #5a6c7d; font-size: 14px; margin-top: 4px; margin-left: 0px;">
